name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - run: npm test

      - name: Verify dist is up to date
        run: |
          npm run build
          git diff --exit-code dist/index.js || (echo "ERROR: dist/index.js is stale. Run 'npm run build' and commit before tagging." && exit 1)

      - name: Move floating major tag
        run: |
          MAJOR=$(echo "${GITHUB_REF_NAME}" | cut -d. -f1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "${MAJOR}" -m "Release ${GITHUB_REF_NAME}"
          git push origin "${MAJOR}" --force
