name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm ci

      - run: npm test

      - name: Build and commit dist
        run: |
          npm run build
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/index.js dist/822.index.js dist/cwe-tools.js 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: rebuild dist for ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - name: Move floating major tag
        run: |
          MAJOR=$(echo "${GITHUB_REF_NAME}" | cut -d. -f1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "${MAJOR}" -m "Release ${GITHUB_REF_NAME}"
          git push origin "${MAJOR}" --force
