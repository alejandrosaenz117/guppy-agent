name: Security Scan

on:
  pull_request:

jobs:
  guppy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: alejandrosaenz117/guppy-agent@v1
        with:
          api_key: ${{ secrets.LLM_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: 'anthropic'
          model: 'claude-sonnet-4-6'
          fail_on_severity: 'high'
          post_comments: true
