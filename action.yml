name: 'Guppy Security Scanner'
description: 'Admiral Ackbar-inspired security analysis for GitHub PRs'
author: 'guppy-agent'

inputs:
  api_key:
    description: 'LLM API key (OpenAI, Anthropic, or Google)'
    required: true
  provider:
    description: 'LLM provider: anthropic, openai, or google'
    required: false
    default: 'anthropic'
  model:
    description: 'Model name (e.g., claude-3-5-sonnet-20241022, gpt-4, gemini-2.0-flash)'
    required: false
    default: 'claude-3-5-sonnet-20241022'
  post_comments:
    description: 'Post findings as inline PR comments'
    required: false
    default: 'true'
  fail_on_severity:
    description: 'Fail the build if findings meet this severity (critical|high|medium|low|none)'
    required: false
    default: 'high'
  github_token:
    description: 'GitHub token for PR interactions'
    required: true
  upload_sarif:
    description: 'Upload findings as SARIF to GitHub Advanced Security (requires security-events: write)'
    required: false
    default: 'false'
  structural_analysis:
    description: 'Start chiasmus MCP server and expose call graph tools to the Hunter. Enables live reachability and dead-code queries during analysis.'
    required: false
    default: 'false'

outputs:
  findings_count:
    description: 'Total number of vulnerabilities found'
  blocking_count:
    description: 'Number of blocking-level vulnerabilities'

runs:
  using: 'node24'
  main: 'dist/index.js'
