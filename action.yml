name: 'Guppy Security Scanner'
description: 'Admiral Ackbar-inspired security analysis for GitHub PRs'
author: 'guppy-agent'

inputs:
  api_key:
    description: 'LLM API key (OpenAI, Anthropic, or Google)'
    required: true
  provider:
    description: 'LLM provider: anthropic, openai, or google'
    required: false
    default: 'anthropic'
  model:
    description: 'Model name (e.g., claude-3-5-sonnet-20241022, gpt-4, gemini-2.0-flash)'
    required: false
    default: 'claude-3-5-sonnet-20241022'
  skeptic_pass:
    description: 'Run a second skeptic pass to filter false positives (disable for single-pass mode)'
    required: false
    default: 'true'
  post_comments:
    description: 'Post findings as inline PR comments'
    required: false
    default: 'true'
  fail_on_severity:
    description: 'Fail the build if findings meet this severity (critical|high|medium|low|none)'
    required: false
    default: 'high'
  comment_severity_threshold:
    description: 'Minimum severity for posting PR comments (critical|high|medium|low|none)'
    required: false
    default: 'high'
  github_token:
    description: 'GitHub token for PR interactions'
    required: true
  upload_sarif:
    description: 'Upload findings as SARIF to GitHub Advanced Security (requires security-events: write)'
    required: false
    default: 'false'
  sca_enabled:
    description: 'Enable SCA dependency scanning via lockfile diff analysis'
    required: false
    default: 'true'
  sca_scanner:
    description: 'Scanner to use for SCA (osv)'
    required: false
    default: 'osv'
  sca_reachability:
    description: 'Enable LLM reachability analysis for SCA findings'
    required: false
    default: 'true'
  sca_reachability_threshold:
    description: 'Minimum CVE severity for call-site (Phase 2) reachability analysis (critical|high|medium|low|none)'
    required: false
    default: 'high'
  sca_reachability_confidence_threshold:
    description: 'Minimum reachability confidence score (1-3) for a finding to be considered blocking'
    required: false
    default: '2'

outputs:
  findings_count:
    description: 'Total number of vulnerabilities found'
  blocking_count:
    description: 'Number of blocking-level vulnerabilities'
  sca_findings_count:
    description: 'Total number of SCA vulnerabilities found'
  sca_blocking_count:
    description: 'Number of blocking-level SCA vulnerabilities'

runs:
  using: 'node24'
  main: 'dist/index.js'
